version: '3.8'

services:
  # React TypeScript App
  frontend:
    build:
      context: ./app
      dockerfile: ../docker/app/Dockerfile
    ports:
      - '3001:3001'
    volumes:
      - ./app:/app:cached # cached improves macOS/Windows perf
      - /app/node_modules # exclude node_modules from host mount
      - /app/dist # exclude Vite build output
      - /app/.vite # exclude Vite cache
      - /app/.cache # exclude various cache directories
      - /app/coverage # exclude test coverage reports
      - /app/.nyc_output # exclude NYC coverage output
      - /app/.eslintcache # exclude ESLint cache
      - /app/.turbo # exclude Turbo cache
      - /app/.yarn/cache # exclude Yarn cache
      - /app/.pnpm-store # exclude PNPM store
    environment:
      - REACT_APP_API_URL=http://backend:8000 # use service name, not localhost
      # Vite dev proxy: browser → frontend → stripe service (see app/vite.config.ts)
      - VITE_STRIPE_PROXY_TARGET=http://stripe:5000
    depends_on:
      - backend
      - stripe

  # Laravel API
  backend:
    build:
      context: ./api
      dockerfile: ../docker/api/Dockerfile
    ports:
      - '8000:8000'
    volumes:
      - ./api:/var/www/html:cached
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - ./api/storage:/var/www/html/storage
      - ./api/public:/var/www/html/public
      - laravel_storage:/var/www/html/storage
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=geocars
      - DB_USERNAME=geocars
      - DB_PASSWORD=password
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_GATEWAY_INGEST_SECRET=${STRIPE_GATEWAY_INGEST_SECRET:-}
    depends_on:
      - mysql

  # Stripe Server
  stripe:
    build:
      context: ./stripe
      dockerfile: ../docker/stripe/Dockerfile
    ports:
      - '5000:5000'
    volumes:
      - ./stripe:/stripe:cached
      - /stripe/node_modules
      - /stripe/dist
    depends_on:
      - backend
    environment:
      - NODE_ENV=development
      - PORT=5000
      - LARAVEL_STRIPE_INGEST_URL=http://backend:8000
      - STRIPE_GATEWAY_INGEST_SECRET=${STRIPE_GATEWAY_INGEST_SECRET:-}

  # MySQL Database
  mysql:
    container_name: geocars-mysql
    image: mysql:8.0
    ports:
      - '3306:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=geocars
      - MYSQL_USER=geocars
      - MYSQL_PASSWORD=password
    command: >
      --innodb-buffer-pool-size=512M
      --slow-query-log=1
      --long-query-time=2
      --innodb-log-file-size=128M
      --innodb-flush-log-at-trx-commit=2
      --log-bin-trust-function-creators=1
    volumes:
      - mysql_data:/var/lib/mysql

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - '8080:80'
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=password
    depends_on:
      - mysql

  # Mobile App (React Native / Expo)
  mobile:
    build:
      context: ./mobile
      dockerfile: ../docker/mobile/Dockerfile
    ports:
      - '8081:8081'
    volumes:
      - ./mobile:/app:cached
      - /app/node_modules
      - /app/.expo
    environment:
      - NODE_ENV=development
      # Use backend service name for network resolution within Docker container
      - REACT_APP_API_URL=http://backend:8000
      # CRITICAL: Replace 192.168.X.X with your machine's actual local IP address
      # so your physical mobile phone can find the Metro Bundler over Wi-Fi.
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.X.X
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
    depends_on:
      - backend
    tty: true
    stdin_open: true

volumes:
  mysql_data:
  laravel_storage:
