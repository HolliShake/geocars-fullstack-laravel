version: '3.8'

services:
  # React TypeScript App
  frontend:
    build:
      context: ./app
      dockerfile: ../docker/app/Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend

  # Laravel API
  backend:
    build:
      context: ./api
      dockerfile: ../docker/api/Dockerfile
    ports:
      - '8000:8000'
    volumes:
      - ./api:/var/www/html
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=geocars
      - DB_USERNAME=root
      - DB_PASSWORD=password
    depends_on:
      - mysql

  # MySQL Database
  mysql:
    container_name: geocars-mysql
    image: mysql:8.0
    ports:
      - '3306:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=geocars
      - MYSQL_USER=geocars
      - MYSQL_PASSWORD=password
    command: --innodb-buffer-pool-size=256M --slow-query-log=1 --long-query-time=2 --innodb-log-file-size=64M --innodb-flush-log-at-trx-commit=2
    volumes:
      - mysql_data:/var/lib/mysql

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - '8080:80'
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=password
    depends_on:
      - mysql

volumes:
  mysql_data:
