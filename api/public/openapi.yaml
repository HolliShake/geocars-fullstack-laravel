openapi: 3.0.0
info:
  title: Geocars API
  description: API documentation for the Geocars application
  version: 1.0.0
servers:
  - url: 'http://localhost/api/v1'
    description: Local server
paths:
  /api/Auth/login:
    post:
      tags:
        - Auth
      summary: Login
      description: ' Login with the provided details'
      operationId: loginWithCredentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Auth created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse200'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
  /api/Plan:
    get:
      tags:
        - Plans
      summary: Get paginated list of plans
      description: Retrieve a paginated list of plans with optional search
      operationId: getPlansPaginated
      parameters:
        - name: search
          in: query
          description: Search term
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            default: 0
        - name: rows
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPlanResponse200'
    post:
      tags:
        - Plans
      summary: Create a new plan
      description: ' Create a new plan with the provided details'
      operationId: createPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plan'
      responses:
        '200':
          description: Plan created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePlanResponse200'
  '/api/Plan/{id}':
    get:
      tags:
        - Plans
      summary: Get a specific plan
      description: Retrieve a plan by its ID
      operationId: getPlanById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPlanResponse200'
        '404':
          description: Plan not found
    put:
      tags:
        - Plans
      summary: Update a plan
      description: Update an existing plan with the provided details
      operationId: updatePlan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plan'
      responses:
        '200':
          description: Plan updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePlanResponse200'
        '404':
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
    delete:
      tags:
        - Plans
      summary: Delete a plan
      description: Delete a plan by its ID
      operationId: deletePlan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Plan deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletePlanResponse200'
        '404':
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
