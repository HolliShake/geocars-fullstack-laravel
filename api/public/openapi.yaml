components:
  schemas:
    UnauthenticatedResponse:
      required:
        - message
      properties:
        message:
          description: '--- Shared Response Schemas ---'
          type: string
          example: Unauthenticated.
      type: object
    NotFoundResponse:
      description: Standard not found response
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: The route could not be found.
      type: object
    BadRequestResponse:
      description: Standard bad request response
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Bad request.
      type: object
    ValidationErrorResponse:
      required:
        - message
      properties:
        message:
          type: string
          example: The title field is required. (and 3 more errors)
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              example: The field is required.
      type: object
    SuccessResponse:
      description: Standard success response
      properties:
        status:
          type: string
          example: success
        data:
          description: The data returned by the API
          type: object
          nullable: true
      type: object
    InternalServerErrorResponse:
      description: Standard internal server error response
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Error message.
      type: object
    MetaData:
      description: Pagination and metadata for the response
      required:
        - current_page
        - last_page
        - per_page
        - total
      properties:
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 10
        total:
          type: integer
          example: 8
      type: object
    Auth:
      required:
        - token
        - role
      properties:
        token:
          description: The token for the user
          type: string
        role:
          description: The role of the user
          type: string
      type: object
    LoginRequest:
      required:
        - email
        - password
      properties:
        email:
          description: The email of the user
          type: string
        password:
          description: The password of the user
          type: string
      type: object
    AuthResponse200:
      required:
        - token
        - role
      properties:
        token:
          description: The token for the user
          type: string
        role:
          description: The role of the user
          type: string
      type: object
    Plan:
      title: Plan
      required:
        - id
        - name
        - description
        - price
        - active
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        active:
          type: boolean
          example: true
      type: object
    PaginatedPlan:
      title: PaginatedPlan
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Plan'
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        from:
          type: integer
          nullable: true
        to:
          type: integer
          nullable: true
      type: object
    PaginatedPlanResponse200:
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/PaginatedPlan'
      type: object
    GetPlanResponse200:
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Plan'
      type: object
    CreatePlanResponse200:
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Plan'
      type: object
    UpdatePlanResponse200:
      properties:
